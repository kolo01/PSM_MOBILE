workflows:
  expo-ios-build:
    name: Build PSM Mobile (iOS)
    max_build_duration: 120
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dépendances npm
        script: npm install
        
      - name: Générer le code natif (Expo Prebuild)
        script: npx expo prebuild --clean
        
      - name: Installer les dépendances iOS (CocoaPods)
        script: |
          cd ios
          pod install
          
      - name: Récupérer les certificats et profils iOS
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "ci.psm.mobile" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Compiler l'application iOS (Release .ipa)
        script: |
          # Ajout explicite du DEVELOPMENT_TEAM pour forcer Xcode à lier le profil
          xcode-project build-ipa \
            --workspace "ios/PSM.xcworkspace" \
            --scheme "PSM" \
            -- DEVELOPMENT_TEAM="P534537N35"
          
    artifacts:
      - build/ios/ipa/*.ipa