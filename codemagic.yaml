expo-ios-build:
    name: Build PSM Mobile (iOS)
    max_build_duration: 120
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # AUCUN BLOC ios_signing ICI
    scripts:
      - name: Installer les dépendances npm
        script: npm install
        
      - name: Générer le code natif iOS (Expo Prebuild)
        script: npx expo prebuild --platform ios --clean
        
      - name: Installer les dépendances iOS (CocoaPods)
        script: |
          cd ios
          pod install
          
      - name: Télécharger les profils et forcer la signature
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "ci.psm.mobile" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Compiler l'application iOS (Release .ipa)
        script: |
          xcode-project build-ipa \
            --workspace "ios/PSM.xcworkspace" \
            --scheme "PSM"
          
    artifacts:
      - build/ios/ipa/*.ipa
