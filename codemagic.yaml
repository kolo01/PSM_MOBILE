workflows:
  expo-ios-build:
    name: Build PSM Mobile (iOS)
    max_build_duration: 120
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # Le profil existant maintenant chez Apple, l'intégration native va le trouver et l'injecter d'office.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ci.psm.mobile
    scripts:
      - name: Installer les dépendances npm
        script: npm install
        
      - name: Générer le code natif (Expo Prebuild)
        script: npx expo prebuild --clean
        
      - name: Installer les dépendances iOS (CocoaPods)
        script: |
          cd ios
          pod install
          
      - name: Compiler l'application iOS (Release .ipa)
        script: |
          xcode-project build-ipa \
            --workspace "ios/PSM.xcworkspace" \
            --scheme "PSM"
            
    artifacts:
      - build/ios/ipa/*.ipa
