workflows:
  expo-release-build:
    name: Build PSM Mobile (Android & iOS)
    max_build_duration: 120
    environment:
      groups:
        - keystore_credentials
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Installer les dépendances npm
        script: npm install
        
      - name: Générer le code natif (Expo Prebuild)
        script: npx expo prebuild --clean
        
      - name: Préparer le fichier Keystore pour Android
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android-upload-key.keystore
          
      - name: Compiler l'archive Android (Release .aab)
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/android-upload-key.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
            
      - name: Installer les dépendances iOS (CocoaPods)
        script: |
          cd ios
          pod install
          
      - name: Créer et télécharger les certificats Apple
        script: |
          # 1. Initialise le trousseau de clés sécurisé du serveur
          keychain initialize
          
          # 2. Se connecte à Apple et CRÉE le profil s'il n'existe pas (--create)
          app-store-connect fetch-signing-files "ci.psm.mobile" --type IOS_APP_STORE --create
          
          # 3. Ajoute les certificats récupérés au trousseau et au projet Xcode
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Compiler l'application iOS (Release .ipa)
        script: |
          xcode-project build-ipa \
            --workspace "ios/PSM.xcworkspace" \
            --scheme "PSM" \
            --distribution-type app_store
          
    artifacts:
      - android/app/build/outputs/bundle/release/**/*.aab
      - build/ios/ipa/*.ipa